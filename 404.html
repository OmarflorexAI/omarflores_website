<!DOCTYPE html>
<html lang="en" class="scroll-smooth antialiased">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Omar Flores</title>
  <meta name="robots" content="noindex, follow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body { background:#050505; color:#E9E9E6; font-family:'DM Sans',sans-serif; margin:0;
           min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:2rem; }
    .wrap { max-width:32rem; }
    .eyebrow { font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:#D4AF37; }
    h1 { font-family:'Instrument Serif',serif; font-size:clamp(72px,18vw,140px); line-height:1; margin:0.5rem 0; color:#fff; }
    h2 { font-family:'Instrument Serif',serif; font-size:clamp(22px,4vw,30px); color:#fff; margin:0 0 1rem; }
    p { color:#B0B7C3; line-height:1.7; margin:0 0 2rem; }
    a.btn { display:inline-block; background:#D4AF37; color:#000; font-family:'JetBrains Mono',monospace;
            font-size:11px; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; text-decoration:none;
            padding:0.75rem 1.75rem; border-radius:6px; transition:opacity .2s; }
    a.btn:hover { opacity:0.85; }
  </style>
</head>
<body>
  <div class="wrap">
    <span class="eyebrow">// Error 404</span>
    <h1>404</h1>
    <h2>This page ran off to automate something.</h2>
    <p>The page you're looking for doesn't exist or moved. Let's get you back on track.</p>
